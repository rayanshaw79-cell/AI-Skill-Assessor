version: "3.8"

services:
  backend:
    build: .
    container_name: assessor-backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./sessions.db:/app/sessions.db
    restart: unless-stopped

  frontend:
    build: .
    container_name: assessor-frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
